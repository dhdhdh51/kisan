name: Android Signed Release

on:
  push:
    tags:
      - 'v*'          # Triggers on tags like v1.0.0, v1.2.3
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (required for Android build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 4. Install JS dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Cache Gradle to speed up future builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6. Decode the keystore from GitHub Secrets (base64 encoded)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # 7. Build signed release APK
      - name: Build Signed APK
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # 8. Rename APK with version tag
      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          cp android/app/build/outputs/apk/release/app-release.apk \
             KisanSathi-${VERSION}-release.apk

      # 9. Upload APK as GitHub Release asset
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: KisanSathi-*.apk
          name: Kisan Sathi ${{ github.ref_name }}
          body: |
            ## 🌾 Kisan Sathi ${{ github.ref_name }}

            ### Naye Features / Changes
            - Auto-generated release from tag ${{ github.ref_name }}

            ### Install karne ka tarika
            1. APK file download karein
            2. Phone mein "Install from unknown sources" enable karein
            3. APK install karein aur use karein!

            ### What's included
            - 🌱 Field/crop management
            - 🤖 AI-powered farming advice (Hindi/Hinglish)
            - 🔔 Smart watering & fertilizer reminders
            - 💰 Expense tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. Also upload APK as workflow artifact (available even without a tag)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KisanSathi-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

